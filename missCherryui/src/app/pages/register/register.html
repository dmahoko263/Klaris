<div class="min-h-[calc(100vh-64px)] flex items-center justify-center p-6">

  <div class="card w-full max-w-lg">
    <div class="card-body">

      <div class="mb-6">
        <h1 class="text-2xl font-extrabold">Create Account</h1>
        <p class="text-sm text-muted">Register for '' Pharma Trace</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

        <!-- Full Name -->
        <div>
          <label class="label">Full Name</label>
          <input class="input" formControlName="fullName" />
        </div>

        <!-- Email -->
        <div>
          <label class="label">Email</label>
          <input class="input" formControlName="email" />
        </div>

        <!-- Password -->
        <div>
          <label class="label">Password</label>
          <input type="password" class="input" formControlName="password" />
        </div>

        <!-- Role -->
        <div>
          <label class="label">Role</label>
          <select class="input" formControlName="role">
            <option value="admin">Admin</option>
            <option value="manufacturer">Manufacturer</option>
            <option value="distributor">Distributor</option>
            <option value="pharmacy">Pharmacy</option>
            <option value="patient">Patient</option>
          </select>
        </div>

        <!-- Wallet -->
        <div>
          <label class="label">Wallet Address</label>
          <input class="input" formControlName="walletAddress" />
        </div>

        <!-- Organization -->
        <div>
          <label class="label">Organization</label>
          <input class="input" formControlName="organizationName" />
        </div>

        <!-- Phone -->
        <div>
          <label class="label">Phone</label>
          <input class="input" formControlName="phone" />
        </div>

        <!-- Error -->
        @if (error) {
          <div class="alert alert-danger">
            {{ error }}
          </div>
        }

        <!-- Success -->
        @if (success) {
          <div class="alert alert-success">
            {{ success }}
          </div>
        }

        <!-- Submit -->
        <button class="btn btn-primary w-full" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Account' }}
        </button>

        <div class="text-center text-sm text-muted">
          Already have an account?
          <a routerLink="/auth" class="font-semibold text-foreground hover:underline">
            Login
          </a>
        </div>

      </form>

    </div>
  </div>

</div>
