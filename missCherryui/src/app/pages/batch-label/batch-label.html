<div class="print-area p-6 bg-white text-black w-[400px]">
  <div class="border-2 border-black p-4 rounded-xl">

    <h2 class="text-lg font-bold text-center mb-3">
       Pharmaceutical Package Label
    </h2>

    <div class="text-sm space-y-1">
      <div><strong>Drug:</strong> {{ batch?.drugName }}</div>
      <div><strong>Batch ID:</strong> {{ batch?.batchId }}</div>
      <div><strong>Manufacturer:</strong> {{ batch?.manufacturerName }}</div>
      <div><strong>MFG Date:</strong> {{ formatDate(batch?.manufactureDate) }}</div>
      <div><strong>EXP Date:</strong> {{ formatDate(batch?.expiryDate) }}</div>
    </div>

    <div class="flex justify-center my-4">
      <qrcode
        [qrdata]="qrValue"
        [width]="140"
        [errorCorrectionLevel]="'M'"
      ></qrcode>
    </div>

    <div class="text-xs text-center break-all">
      Scan to verify authenticity
    </div>
  </div>

  <button class="btn btn-primary mt-4 w-full print:hidden" (click)="print()">
    Print Label
  </button>
</div>
