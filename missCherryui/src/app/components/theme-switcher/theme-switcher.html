<button
  type="button"
  (click)="theme.toggle()"
  class="fixed bottom-5 right-5 z-[9999] group select-none
         rounded-full border border-border bg-surface/90 backdrop-blur
         shadow-card hover:shadow-pop transition
         px-3 py-2 flex items-center gap-3"
  [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
>
  <!-- Left label -->
  <span class="text-xs font-semibold text-muted">Theme</span>

  <!-- Track -->
  <span
    class="relative inline-flex h-8 w-16 items-center rounded-full border border-border
           bg-surface-2 transition"
  >
    <!-- Glow (only when dark) -->
    <span
      class="absolute inset-0 rounded-full opacity-0 blur-md transition
             bg-[color:var(--color-primary)]"
      [class.opacity-25]="theme.isDark()"
    ></span>

    <!-- Thumb -->
    <span
      class="relative z-10 inline-flex h-7 w-7 items-center justify-center rounded-full
             bg-surface shadow-card transition-transform"
      [class.translate-x-8]="theme.isDark()"
      [class.translate-x-1]="!theme.isDark()"
    >
      <span class="text-sm">
        @if (theme.isDark()) { 🌙 } @else { ☀️ }
      </span>
    </span>
  </span>

  <!-- Right state text -->
  <span class="text-xs font-extrabold tracking-tight text-foreground w-10 text-right">
    @if (theme.isDark()) { Dark } @else { Light }
  </span>
</button>
