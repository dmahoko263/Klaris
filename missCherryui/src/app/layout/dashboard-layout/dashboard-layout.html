<div class="min-h-screen bg-background text-foreground">
 <app-side-bar [(open)]="sidebarOpen"></app-side-bar> 

  <div [class]="layout.mainPaddingClass()">
    <header class="sticky top-0 z-30 border-b border-border bg-surface/90 backdrop-blur">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between gap-4">

        <!-- Left: menu + welcome -->
        <div class="flex items-center gap-3 min-w-0">
          <button
            class="md:hidden rounded-xl border border-border px-3 py-2 text-sm font-semibold hover:bg-surface-2"
            (click)="sidebarOpen = true"
          >
            ☰ Menu
          </button>

       
          

            <div class="truncate font-extrabold tracking-tight">
              Welcome, {{ userMail }} 
            </div><br>
   <!-- <div class=" tracking-tight">
              Wallet: {{ address }} 
            </div> -->
            <div class="mt-1 flex flex-wrap items-center gap-2 text-xs text-muted">
              @if (role) {



               <span
               
  class="rounded-full border px-2.5 py-1 text-xs font-semibold capitalize"
  [ngClass]="{
    'border-emerald-300 bg-emerald-50 text-emerald-800 dark:border-emerald-900 dark:bg-emerald-950/40 dark:text-emerald-200': 'Manufacture',
    'border-yellow-300 bg-yellow-50 text-yellow-800 dark:border-yellow-900 dark:bg-yellow-950/30 dark:text-yellow-200': 'Admin',
    'border-rose-300 bg-rose-50 text-rose-800 dark:border-rose-900 dark:bg-rose-950/40 dark:text-rose-200': 'Manufacture',
    'border-zinc-300 bg-zinc-50 text-zinc-800 dark:border-zinc-700 dark:bg-zinc-900/40 dark:text-zinc-200': 'Manufacture'
  }"
>
  {{ role }}
</span>
              }

              <!-- @if (email()) {
                <span class="rounded-full bg-surface-2 border border-border px-2.5 py-1">
                  {{ email() }}
                </span>
              } -->

              <!-- @if () {
                <span class="rounded-full bg-surface-2 border border-border px-2.5 py-1">
                  {{ country() }}
                </span>
              } -->
            </div>
          
        </div>

        <!-- Right: version (or your actions area) -->
        <div class="shrink-0 text-sm text-muted"></div>

      </div>
    </header>

    <main class="w-full px-3 sm:px-4 lg:px-4 py-5">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
